<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo... | JGStudio</title>
    <meta http-equiv="refresh" content="0; url=index.html#projects">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #080808;
            color: #F0ECE5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(214,48,49,0.2);
            border-top-color: #D63031;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p style="font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #888888;">Redirigiendo al Portafolio...</p>
    </div>
    <script>
        setTimeout(() => {
            window.location.href = 'index.html#projects';
        }, 500);
    </script>
</body>
</html>
